name: README sync

on:
  push:
    paths:
      - 'readme.txt'
      - 'README.md'
      - 'scripts/build-readme.mjs'
      - 'scripts/readme-parts/**'
      - '.github/workflows/readme.yml'
  pull_request:
    paths:
      - 'readme.txt'
      - 'README.md'
      - 'scripts/build-readme.mjs'
      - 'scripts/readme-parts/**'

jobs:
  check:
    name: README.md is in sync with readme.txt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run readme:check
