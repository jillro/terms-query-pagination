name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build plugin zip and create draft release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run version:check
      - name: Assert tag matches package.json version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag version ($tag_version) does not match package.json version ($pkg_version)" >&2
            exit 1
          fi
      - run: npm run build
      - run: npm run plugin-zip
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: terms-query-pagination.zip
